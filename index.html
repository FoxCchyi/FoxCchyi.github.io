<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>刘看山小游戏</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      var redirectKey = "zhihu_auth_redirected";
      var gameUrl = "game.html";
      var redirectUri = "https://kanshan.netlify.app/";
      var authUrl = "https://openapi.zhihu.com/authorize"
        + "?redirect_uri=" + encodeURIComponent(redirectUri)
        + "&app_id=235"
        + "&response_type=code";

      function hasRedirected() {
        try {
          return window.localStorage.getItem(redirectKey) === "1";
        } catch (error) {
          return false;
        }
      }

      function markRedirected() {
        try {
          window.localStorage.setItem(redirectKey, "1");
        } catch (error) {
          // If storage is unavailable, still continue to the authorization page.
        }
      }

      if (!hasRedirected()) {
        markRedirected();
        window.location.replace(authUrl);
        return;
      }

      window.location.replace(gameUrl);
    }());
  </script>
</body>
</html>
