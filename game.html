<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, viewport-fit=cover">
		<title>liukanshan</title>
		<style>
html, body, #game-root, #game-frame, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

html, body {
	width: 100%;
	height: 100%;
	background: black;
	overflow: hidden;
}

body {
	color: white;
	touch-action: none;
	-webkit-user-select: none;
	user-select: none;
}

#game-root {
	position: fixed;
	inset: 0;
	background: black;
	overflow: hidden;
}

#game-frame {
	position: absolute;
	left: 50%;
	top: 50%;
	margin-left: -640px;
	margin-top: -360px;
	width: 1280px;
	height: 720px;
	background: black;
	overflow: hidden;
	transform-origin: center center;
	transform: rotate(var(--game-rotation, 0deg)) scale(var(--game-scale, 1));
}

#canvas {
	display: block;
	width: 1280px !important;
	height: 720px !important;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="game.icon.png" />
<link rel="apple-touch-icon" href="game.apple-touch-icon.png"/>

		<link id="-gd-engine-icon" rel="icon" type="image/png" href="game.icon.png" />
		<link rel="apple-touch-icon" href="game.apple-touch-icon.png"/>
	</head>
	<body>
		<div id="game-root">
			<div id="game-frame">
				<canvas id="canvas" width="1280" height="720">
					Your browser does not support the canvas tag.
				</canvas>

				<div id="status">
					<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="game.png" alt="">
					<progress id="status-progress"></progress>
					<div id="status-notice"></div>
				</div>
			</div>
		</div>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<script src="game.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":0,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"game","experimentalVK":false,"fileSizes":{"game.pck":79059028,"game.wasm":37695054},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const GAME_WIDTH = 1280;
	const GAME_HEIGHT = 720;
	const canvas = document.getElementById('canvas');
	const mobileQuery = window.matchMedia('(pointer: coarse), (hover: none)');
	const portraitQuery = window.matchMedia('(orientation: portrait)');
	let shouldRotateToLandscape = false;
	let gameScale = 1;

	function isMobileLike() {
		return mobileQuery.matches
			|| navigator.maxTouchPoints > 1
			|| /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
			|| window.innerWidth <= 768;
	}

	function updateMobileLayout() {
		const viewport = window.visualViewport || window;
		const logicalWidth = viewport.width || window.innerWidth;
		const logicalHeight = viewport.height || window.innerHeight;
		const isPortraitViewport = logicalHeight > logicalWidth;
		const isNarrowViewport = Math.min(logicalWidth, logicalHeight) <= 900;
		shouldRotateToLandscape = isPortraitViewport && (isMobileLike() || isNarrowViewport);
		const fitWidth = shouldRotateToLandscape ? logicalHeight : logicalWidth;
		const fitHeight = shouldRotateToLandscape ? logicalWidth : logicalHeight;
		gameScale = Math.min(fitWidth / GAME_WIDTH, fitHeight / GAME_HEIGHT);

		document.documentElement.style.setProperty('--game-scale', gameScale);
		document.documentElement.style.setProperty('--game-rotation', shouldRotateToLandscape ? '90deg' : '0deg');
		document.documentElement.classList.toggle('mobile-portrait', shouldRotateToLandscape);
		document.body.classList.toggle('mobile-portrait', shouldRotateToLandscape);
	}

	function getMappedClientPosition(clientX, clientY) {
		const viewport = window.visualViewport || window;
		const centerX = (viewport.width || window.innerWidth) * 0.5;
		const centerY = (viewport.height || window.innerHeight) * 0.5;
		const localX = GAME_WIDTH * 0.5 + (clientY - centerY) / gameScale;
		const localY = GAME_HEIGHT * 0.5 - (clientX - centerX) / gameScale;

		if (localX < 0 || localX > GAME_WIDTH || localY < 0 || localY > GAME_HEIGHT) {
			return null;
		}

		const rect = canvas.getBoundingClientRect();
		return {
			x: rect.left + (localX / GAME_WIDTH) * rect.width,
			y: rect.top + (localY / GAME_HEIGHT) * rect.height,
		};
	}

	function remapPointerEvent(event) {
		if (!shouldRotateToLandscape || event.__godotRemapped) {
			return;
		}
		const mapped = getMappedClientPosition(event.clientX, event.clientY);
		if (!mapped) {
			return;
		}

		event.preventDefault();
		event.stopImmediatePropagation();

		const remapped = new PointerEvent(event.type, {
			bubbles: true,
			cancelable: true,
			composed: true,
			pointerId: event.pointerId,
			pointerType: event.pointerType,
			isPrimary: event.isPrimary,
			button: event.button,
			buttons: event.buttons,
			clientX: mapped.x,
			clientY: mapped.y,
			screenX: mapped.x,
			screenY: mapped.y,
			ctrlKey: event.ctrlKey,
			shiftKey: event.shiftKey,
			altKey: event.altKey,
			metaKey: event.metaKey,
			pressure: event.pressure,
			width: event.width,
			height: event.height,
		});
		Object.defineProperty(remapped, '__godotRemapped', { value: true });
		canvas.dispatchEvent(remapped);

		const mouseTypeByPointerType = {
			pointerdown: 'mousedown',
			pointermove: 'mousemove',
			pointerup: 'mouseup',
		};
		const mouseType = mouseTypeByPointerType[event.type];
		if (mouseType) {
			dispatchMappedMouseEvent(mouseType, event, mapped);
		}
		if (event.type === 'pointerup') {
			dispatchMappedMouseEvent('click', event, mapped);
		}
	}

	function dispatchMappedMouseEvent(type, sourceEvent, mapped) {
		const remapped = new MouseEvent(type, {
			bubbles: true,
			cancelable: true,
			composed: true,
			button: sourceEvent.button,
			buttons: sourceEvent.buttons,
			clientX: mapped.x,
			clientY: mapped.y,
			screenX: mapped.x,
			screenY: mapped.y,
			ctrlKey: sourceEvent.ctrlKey,
			shiftKey: sourceEvent.shiftKey,
			altKey: sourceEvent.altKey,
			metaKey: sourceEvent.metaKey,
		});
		Object.defineProperty(remapped, '__godotRemapped', { value: true });
		canvas.dispatchEvent(remapped);
	}

	function createMappedTouch(touch) {
		const mapped = getMappedClientPosition(touch.clientX, touch.clientY);
		if (!mapped || typeof Touch === 'undefined') {
			return null;
		}
		return new Touch({
			identifier: touch.identifier,
			target: canvas,
			clientX: mapped.x,
			clientY: mapped.y,
			screenX: mapped.x,
			screenY: mapped.y,
			pageX: mapped.x + window.scrollX,
			pageY: mapped.y + window.scrollY,
			radiusX: touch.radiusX || 1,
			radiusY: touch.radiusY || 1,
			rotationAngle: touch.rotationAngle || 0,
			force: touch.force || 0,
		});
	}

	function getMappedTouches(touches) {
		const mappedTouches = [];
		for (let index = 0; index < touches.length; index += 1) {
			const mappedTouch = createMappedTouch(touches[index]);
			if (mappedTouch) {
				mappedTouches.push(mappedTouch);
			}
		}
		return mappedTouches;
	}

	function remapTouchEvent(event) {
		if (!shouldRotateToLandscape || event.__godotRemapped) {
			return;
		}
		event.preventDefault();
		event.stopImmediatePropagation();
		if (typeof TouchEvent === 'undefined' || typeof Touch === 'undefined') {
			return;
		}

		const changedTouches = getMappedTouches(event.changedTouches);
		if (changedTouches.length === 0) {
			return;
		}
		const remapped = new TouchEvent(event.type, {
			bubbles: true,
			cancelable: true,
			composed: true,
			touches: getMappedTouches(event.touches),
			targetTouches: getMappedTouches(event.targetTouches),
			changedTouches,
			ctrlKey: event.ctrlKey,
			shiftKey: event.shiftKey,
			altKey: event.altKey,
			metaKey: event.metaKey,
		});
		Object.defineProperty(remapped, '__godotRemapped', { value: true });
		canvas.dispatchEvent(remapped);
	}

	function requestLandscapeOrientation() {
		if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
			document.documentElement.requestFullscreen().catch(function () {
				// Fullscreen usually requires a user gesture; keep the game clickable if the browser refuses.
			});
		}
		if (screen.orientation && screen.orientation.lock) {
			screen.orientation.lock('landscape').catch(function () {
				// Browsers commonly require fullscreen or a user gesture; keep the unrotated layout if it fails.
			});
		}
	}

	function listenToQuery(query) {
		if (query.addEventListener) {
			query.addEventListener('change', updateMobileLayout);
		} else if (query.addListener) {
			query.addListener(updateMobileLayout);
		}
	}

	listenToQuery(mobileQuery);
	listenToQuery(portraitQuery);
	window.addEventListener('resize', updateMobileLayout);
	window.addEventListener('orientationchange', updateMobileLayout);
	window.addEventListener('pointerdown', remapPointerEvent, { capture: true });
	window.addEventListener('pointermove', remapPointerEvent, { capture: true });
	window.addEventListener('pointerup', remapPointerEvent, { capture: true });
	window.addEventListener('pointercancel', remapPointerEvent, { capture: true });
	window.addEventListener('touchstart', remapTouchEvent, { capture: true, passive: false });
	window.addEventListener('touchmove', remapTouchEvent, { capture: true, passive: false });
	window.addEventListener('touchend', remapTouchEvent, { capture: true, passive: false });
	window.addEventListener('touchcancel', remapTouchEvent, { capture: true, passive: false });
	window.addEventListener('pointerdown', requestLandscapeOrientation, { once: true });
	window.addEventListener('touchstart', requestLandscapeOrientation, { once: true });
	updateMobileLayout();
	requestLandscapeOrientation();

	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		displayFailureNotice('Error\nThe following features required to run Godot projects on the Web are missing:\n' + missing.join('\n'));
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
